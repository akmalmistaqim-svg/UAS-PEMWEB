<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login ACC Agro Clima Care</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Styling khusus agar posisi selalu di tengah layar */
        body {
            background-color: #f4f6f9; 
            font-family: 'Poppins', sans-serif; /* Menerapkan font Poppins */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Styling untuk kotak form login */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.08);
        }

        /* Menyamakan warna hijau dengan referensi gambar */
        .btn-custom-green {
            background-color: #4CAF50;
            border-color: #4CAF50;
            color: #ffffff;
            font-weight: 500;
        }

        .btn-custom-green:hover {
            background-color: #43a047;
            border-color: #43a047;
            color: #ffffff;
        }

        .text-custom-green {
            color: #4CAF50;
        }
        
        .text-custom-green:hover {
            color: #43a047;
        }

        /* Styling tambahan untuk area logo */
        .logo-area {
            gap: 12px; /* Memberikan jarak antara ikon dan grup teks */
        }
        
        .logo-leaf-icon {
            height: 65px; /* Tinggi disesuaikan agar proporsional dengan teks 2 baris */
            width: auto;
        }
        
        /* Pengaturan teks logo */
        .brand-title {
            font-size: 2.2rem;
            line-height: 0.9; /* Merapatkan jarak bawah ACC ke teks Agro */
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-size: 1.1rem;
            color: #3b3b3b; /* Warna abu-abu gelap */
            font-weight: 600;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="text-center mb-4">
            
            <div class="logo-area d-flex align-items-center justify-content-center mb-3">
                
                <div>
                    <img src="../LogoWeb.png" alt="Logo ACC" class="logo-leaf-icon img-fluid">
                </div>
                
                <div class="text-start d-flex flex-column justify-content-center mt-1">
                    <h1 class="text-custom-green fw-bold mb-0 brand-title">ACC</h1>
                    <span class="brand-subtitle mt-1">Agro Clima Care</span>
                </div>

            </div>
            
            <p class="text-muted mt-2" style="font-size: 0.9rem;">Silakan login untuk melanjutkan</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="mb-3">
                <label for="emailInput" class="form-label" style="font-size: 0.9rem;">Email Address</label>
                <input type="email" class="form-control" id="emailInput" placeholder="Masukkan email Anda" required>
            </div>
            
            <div class="mb-3">
                <label for="passwordInput" class="form-label" style="font-size: 0.9rem;">Password</label>
                <input type="password" class="form-control" id="passwordInput" placeholder="Masukkan password Anda" required>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe" style="font-size: 0.85rem;">Ingat Saya</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-custom-green w-100 py-2 mb-3 fw-bold">LOGIN</button>
            
            <div class="text-center">
                <p class="mb-0" style="font-size: 0.85rem;">Belum punya akun? 
                    <a href="registerpage.html" class="text-decoration-none text-custom-green fw-bold">Daftar di sini</a>
                </p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
